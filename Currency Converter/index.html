<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Convertor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <div id="heading"><h2>Currency Converter</h2></div>
    <div id="inp"><input type="text" value="1"></div>
    <div id="showdowns">
      <div id="sh1">
        <img src="https://flagsapi.com/US/flat/64.png">
        <div id="showdown1"><select name="from">
          
        </select></div>        
      </div>
      <p>To</p>
      <div id="sh2">
        <img src="https://flagsapi.com/IN/flat/64.png">
        <div id="showdown2"><select name="to">
          
        </select></div>
      </div>
    </div>
    <div id="msg">1 USD = 83 INR</div>
    <div id="bttn">
      <button id="btn">Exchange</button>
    </div>
  </div>
  <script src="codes.js"></script>
  <script src="script.js"></script>
</body>
</html>
