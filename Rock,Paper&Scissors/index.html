<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body id="body">
    <div id="header">Rock, Paper & Scissors</div>
    <div id="choices">
      <div id="first" class="choice">
        <img src="./Images/stone.jpg" alt="error" />
      </div>
      <div id="second" class="choice">
        <img src="./Images/paper.jpg" alt="error" />
      </div>
      <div id="third" class="choice">
        <img src="./Images/scissors.webp" alt="error" />
      </div>
    </div>
    <div id="scoreboard">
      <div id="user">
        <p id="userscore">0</p>
        <p>You</p>
      </div>
      <div id="comp">
        <p id="compscore">0</p>
        <p>Comp</p>
      </div>
    </div>
    <div id="msgcontainer">
      <p id="msg">Play your move</p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
